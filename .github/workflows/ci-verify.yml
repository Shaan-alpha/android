name: CI Verify MediaPlayer
# Temporary helper to build/lint/regenerate screenshots for a fork PR branch on the fork's
# own runners (the upstream PR CI is gated behind maintainer approval). Safe to delete.
on: # yamllint disable-line rule:truthy
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to verify"
        required: true
        default: "fix-media-widget-compose"

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.inputs.branch }}
          persist-credentials: true

      - uses: ./.github/actions/setup-build-env
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          mock-google-services: "true"

      - name: Update screenshots
        run: ./gradlew updateDebugScreenshotTest updateFullDebugScreenshotTest

      - name: Commit and push screenshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update screenshots" || echo "No screenshot changes"
          git push origin HEAD:${{ github.event.inputs.branch }}

      - name: ktlint
        if: ${{ !cancelled() }}
        run: ./gradlew ktlintCheck :build-logic:convention:ktlintCheck --continue

      - name: Unit tests
        if: ${{ !cancelled() }}
        run: ./gradlew testDebugUnitTest :app:testFullDebugUnitTest
