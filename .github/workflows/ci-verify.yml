name: CI Verify MediaPlayer
# Temporary helper to lint/test/regenerate screenshots for a fork PR branch on the fork's own
# runners (upstream PR CI is gated behind maintainer approval). Safe to delete.
on: # yamllint disable-line rule:truthy
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to verify"
        required: true
        default: "fix-media-widget-compose"
      screenshots:
        description: "Regenerate screenshots (heavy)"
        required: false
        default: "true"

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.inputs.branch }}
          persist-credentials: true

      - uses: ./.github/actions/setup-build-env
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          mock-google-services: "true"

      - name: ktlint
        if: ${{ !cancelled() }}
        run: ./gradlew ktlintCheck :build-logic:convention:ktlintCheck --continue

      - name: Unit tests
        if: ${{ !cancelled() }}
        run: ./gradlew testDebugUnitTest :app:testFullDebugUnitTest

      - name: Free disk space
        if: ${{ !cancelled() && github.event.inputs.screenshots != 'false' }}
        run: |
          sudo rm -rf /usr/share/dotnet /usr/share/swift /opt/ghc /usr/local/.ghcup || true
          sudo docker system prune -af || true
          df -h

      - name: Update screenshots
        if: ${{ !cancelled() && github.event.inputs.screenshots != 'false' }}
        run: ./gradlew :app:updateFullDebugScreenshotTest --no-daemon

      - name: Commit and push screenshots
        if: ${{ !cancelled() && github.event.inputs.screenshots != 'false' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update screenshots" || echo "No screenshot changes"
          git push origin HEAD:${{ github.event.inputs.branch }}
